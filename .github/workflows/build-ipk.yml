name: Build IPK

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  IMMORTALWRT_VERSION: 24.10.6
  TARGET: mediatek/filogic
  SDK_FILE: immortalwrt-sdk-24.10.6-mediatek-filogic_gcc-13.3.0_musl.Linux-x86_64.tar.zst
  SDK_SHA256: 8b4340a9b7e8802a7ffa6feb99604a27025cf702baeab052b931f1bfa6a9f638

jobs:
  build:
    name: ImmortalWrt 24.10.6 mediatek/filogic
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            curl \
            file \
            flex \
            gawk \
            gcc-multilib \
            gettext \
            git \
            libncurses-dev \
            libssl-dev \
            python3 \
            python3-distutils \
            python3-setuptools \
            rsync \
            unzip \
            wget \
            zlib1g-dev \
            zstd

      - name: Download ImmortalWrt SDK
        run: |
          set -euo pipefail
          SDK_URL="https://downloads.immortalwrt.org/releases/${IMMORTALWRT_VERSION}/targets/${TARGET}/${SDK_FILE}"
          curl -fL --retry 5 --retry-delay 5 -o sdk.tar.zst "${SDK_URL}"
          echo "${SDK_SHA256}  sdk.tar.zst" | sha256sum -c -
          mkdir sdk
          tar --zstd -xf sdk.tar.zst -C sdk --strip-components=1

      - name: Add local feed
        working-directory: sdk
        run: |
          set -euo pipefail
          echo "src-link fakehttp ${GITHUB_WORKSPACE}" >> feeds.conf.default
          ./scripts/feeds update -a
          for pkg in libmnl libnfnetlink libnetfilter-queue luci-base; do
            ./scripts/feeds install "${pkg}" || true
          done
          ./scripts/feeds install -p fakehttp fakehttp luci-app-fakehttp

      - name: Configure packages
        working-directory: sdk
        run: |
          set -euo pipefail
          cat > .config <<'EOF'
          CONFIG_PACKAGE_fakehttp=m
          CONFIG_PACKAGE_luci-app-fakehttp=m
          CONFIG_PACKAGE_libmnl0=m
          CONFIG_PACKAGE_libnfnetlink0=m
          CONFIG_PACKAGE_libnetfilter-queue1=m
          CONFIG_PACKAGE_nftables=m
          CONFIG_PACKAGE_kmod-nfnetlink-queue=m
          CONFIG_PACKAGE_kmod-nft-queue=m
          EOF
          make defconfig

      - name: Build IPK packages
        working-directory: sdk
        run: |
          set -euo pipefail
          make package/fakehttp/compile V=s -j"$(nproc)"
          make package/luci-app-fakehttp/compile V=s -j"$(nproc)"

      - name: Collect IPK artifacts
        run: |
          set -euo pipefail
          mkdir -p artifacts
          find sdk/bin -type f -name '*.ipk' -print -exec cp -v {} artifacts/ \;
          test -n "$(find artifacts -type f -name 'fakehttp_*.ipk' -print -quit)"
          test -n "$(find artifacts -type f -name 'luci-app-fakehttp_*.ipk' -print -quit)"
          find artifacts -maxdepth 1 -type f -name '*.ipk' -printf '%f\n' | sort > artifacts/ipk-list.txt
          sha256sum artifacts/*.ipk > artifacts/sha256sums.txt

      - name: Upload IPK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fakehttp-ipk-immortalwrt-24.10.6-mediatek-filogic
          path: artifacts/
          if-no-files-found: error
